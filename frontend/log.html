<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log Entry — Mood Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <a href="home.html">Home</a>
        <a href="log.html">Check In</a>
        <a href="entries.html">My Entries</a>
        <a href="analytics.html">Analytics</a>
    </nav>
<h1>Ready to begin?</h1>
<form id="log-form">
    <label>Mood Score (1-10)</label>
    <input type="number" name="mood_score" min="1" max="10">
    <label>How many hours did you sleep last night?</label>
    <input type="number" name="sleep" min="0" max="24">
    <label>On a scale of 0-10, what was your energy level?</label>
    <input type="number" name="energy_level" min="0" max="10">
    <label>Feeling extra elevated today?</label>
    <input type="checkbox" name="mania">
    <label>Feeling disconnected from reality?</label>
    <input type="checkbox" name="psychosis">
    <label>Feeling low or empty inside?</label>
    <input type="checkbox" name="depression">
    <label>Is your mind going to dark places?</label>
    <input type="checkbox" name="intrusive_thoughts">
    <label>Thoughts moving too fast to catch?</label>
    <input type="checkbox" name="racing_thoughts">
    <label>Feeling more irritable than usual?</label>
    <input type="checkbox" name="irritability">
    <label>Pulling away from people today?</label>
    <input type="checkbox" name="social_withdrawal">
    <label>Want to take notes on the day?</label>
    <textarea name="notes" rows="3"></textarea>
    <button type="submit">All Done!</button>
</form>

    <script src="app.js"></script>
</body>
</html>
