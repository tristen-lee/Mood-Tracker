<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check In — Mood Tracker</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#31373E">
    <link rel="apple-touch-icon" href="assets/cairn-logo-512px.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat+Alternates:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Quicksand:wght@300..700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="top-nav">
        <a href="dashboard.html" class="logo-link"><img src="assets/cairn.svg" alt="Cairn" class="logo logo-nav"></a>
        <a href="dashboard.html" class="nav-link">Home</a>
        <a href="log.html" class="nav-link">Check In</a>
        <a href="entries.html" class="nav-link">My Entries</a>
        <a href="analytics.html" class="nav-link">Analytics</a>
    </nav>

    <h1>Ready to begin?</h1>

    <form id="log-form">
        <div class="slider-row">
            <label>Mood Score <span class="slider-val" id="mood-val">5</span></label>
            <input type="range" name="mood_score" min="1" max="10" value="5" oninput="document.getElementById('mood-val').textContent=this.value">
        </div>

        <div class="slider-row">
            <label>Hours of Sleep <span class="slider-val" id="sleep-val">7</span></label>
            <input type="range" name="sleep" min="0" max="24" value="7" oninput="document.getElementById('sleep-val').textContent=this.value">
        </div>

        <div class="slider-row">
            <label>Energy Level <span class="slider-val" id="energy-val">5</span></label>
            <input type="range" name="energy_level" min="0" max="10" value="5" oninput="document.getElementById('energy-val').textContent=this.value">
        </div>

        <div class="checkbox-row">
            <label>Feeling extra elevated today?</label>
            <input type="checkbox" name="mania">
        </div>
        <div class="checkbox-row">
            <label>Feeling disconnected from reality?</label>
            <input type="checkbox" name="psychosis">
        </div>
        <div class="checkbox-row">
            <label>Feeling low or empty inside?</label>
            <input type="checkbox" name="depression">
        </div>
        <div class="checkbox-row">
            <label>Is your mind going to dark places?</label>
            <input type="checkbox" name="intrusive_thoughts">
        </div>
        <div class="checkbox-row">
            <label>Thoughts moving too fast to catch?</label>
            <input type="checkbox" name="racing_thoughts">
        </div>
        <div class="checkbox-row">
            <label>Feeling more irritable than usual?</label>
            <input type="checkbox" name="irritability">
        </div>
        <div class="checkbox-row">
            <label>Pulling away from people today?</label>
            <input type="checkbox" name="social_withdrawal">
        </div>

        <label>Notes</label>
        <textarea name="notes" rows="3" placeholder="Anything on your mind..."></textarea>

        <button type="submit">All Done!</button>
        <div id="form-message"></div>
    </form>

    <footer>
        <a href="terms.html">Terms</a><span> · </span><a href="attributions.html">Attributions</a>
    </footer>

    <div id="success-popup">
        <p id="success-text"></p>
        <p id="success-mood"></p>
    </div>

    <script src="log.js"></script>
</body>
</html>
