    <h1>Settings</h1>

    <div class="settings-card">
        <h2>Display Name</h2>
        <div class="name-row">
            <input type="text" id="name-input" placeholder="First name">
            <button id="name-save">Save</button>
        </div>
        <p class="settings-hint" id="name-message"></p>
    </div>

    <div class="settings-card">
        <h2>Medications</h2>
        <div id="med-list"></div>
        <div class="name-row" style="margin-top:0.75rem">
            <input type="text" id="med-input" placeholder="Medication name">
            <button id="med-add">Add</button>
        </div>
        <p class="settings-hint" id="med-message"></p>
    </div>

    <div class="settings-card">
        <h2>Theme</h2>
        <div class="theme-toggle">
            <button class="theme-btn" data-value="dark">Dark</button>
            <button class="theme-btn" data-value="system">System</button>
            <button class="theme-btn" data-value="light">Light</button>
        </div>
        <p class="settings-hint" style="margin-top:1rem">Unlocked themes</p>
        <div class="theme-toggle" style="margin-top:0.5rem">
            <button class="theme-btn" data-value="raw-stone">🪨 Raw Stone</button>
            <button class="theme-btn" data-value="rose-quartz">🩷 Rose Quartz</button>
            <button class="theme-btn" data-value="amethyst">🟣 Amethyst</button>
        </div>
    </div>

    <div class="settings-card settings-card--danger">
        <h2>Delete Account</h2>
        <p class="settings-hint">Permanently deletes your account and all your data. This cannot be undone.</p>
        <button id="delete-account-btn" class="delete-account-btn">Delete my account</button>
    </div>

    <footer>
        <a href="terms.html">Terms</a><span> · </span><a href="attributions.html">Attributions</a><span> · </span><a href="settings.html">Settings</a>
