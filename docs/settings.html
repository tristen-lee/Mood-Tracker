<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings — Cairn</title>
    <link rel="stylesheet" href="style.css">
    <script src="theme.js"></script>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#31373E">
    <link rel="apple-touch-icon" href="assets/cairn-logo-512px.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat+Alternates:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Quicksand:wght@300..700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="top-nav">
        <a href="dashboard.html" class="logo-link"><img src="assets/cairn.svg" alt="Cairn" class="logo logo-nav"></a>
        <a href="dashboard.html" class="nav-link">Home</a>
        <a href="log.html" class="nav-link">Check In</a>
        <a href="entries.html" class="nav-link">My Entries</a>
        <a href="analytics.html" class="nav-link">Analytics</a>
    </nav>

    <h1>Settings</h1>

    <div class="settings-card">
        <h2>Display Name</h2>
        <div class="name-row">
            <input type="text" id="name-input" placeholder="First name">
            <button id="name-save">Save</button>
        </div>
        <p class="settings-hint" id="name-message"></p>
    </div>

    <div class="settings-card">
        <h2>Medications</h2>
        <div id="med-list"></div>
        <div class="name-row" style="margin-top:0.75rem">
            <input type="text" id="med-input" placeholder="Medication name">
            <button id="med-add">Add</button>
        </div>
        <p class="settings-hint" id="med-message"></p>
    </div>

    <div class="settings-card">
        <h2>Theme</h2>
        <div class="theme-toggle">
            <button class="theme-btn" data-value="dark">Dark</button>
            <button class="theme-btn" data-value="system">System</button>
            <button class="theme-btn" data-value="light">Light</button>
        </div>
    </div>

    <footer>
        <a href="terms.html">Terms</a><span> · </span><a href="attributions.html">Attributions</a><span> · </span><a href="settings.html">Settings</a>
    </footer>

    <script src="settings.js?v=2"></script>
</body>
</html>
